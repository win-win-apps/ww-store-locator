# Prod toml — will be filled in after Shane registers the prod app in the
# win-win partner org and gives us the client_id + fly.io URL.

client_id = "PLACEHOLDER_PROD_CLIENT_ID"
name = "Store Locator: Google Maps"
handle = "ww-store-locator"
application_url = "https://ww-store-locator.fly.dev"
embedded = true

[build]
automatically_update_urls_on_dev = false
include_config_on_deploy = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = ["app/scopes_update"]
  uri = "/webhooks/app/scopes_update"

[access_scopes]
scopes = "read_themes,write_themes"

[auth]
redirect_urls = [
  "https://ww-store-locator.fly.dev/auth/callback",
  "https://ww-store-locator.fly.dev/auth/shopify/callback",
  "https://ww-store-locator.fly.dev/api/auth"
]
