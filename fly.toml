app = 'ww-store-locator'
primary_region = 'yyz'

[build]

[env]
  PORT = '3000'
  SCOPES = 'read_themes,write_themes'
  SHOPIFY_APP_URL = 'https://ww-store-locator.fly.dev'
  # SHOPIFY_API_KEY must be set by Shane via `fly secrets set` after
  # registering the production app in the win-win partner org.

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
